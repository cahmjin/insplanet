<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Glass</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }
#main { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
#three-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#panel {
  position: fixed; top: 0; right: 0;
  width: 270px; height: 100vh;
  background: rgba(15,15,15,0.92);
  border-left: 1px solid rgba(255,255,255,0.1);
  padding: 20px 16px; overflow-y: auto; z-index: 10;
}
#panel h2 { color: #fff; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; opacity: 0.4; }
.section-title { color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; margin-top: 4px; }
.row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.row label { color: rgba(255,255,255,0.6); font-size: 11px; min-width: 64px; }
.row input[type=range] { flex: 1; accent-color: #7318D9; }
.row span { color: rgba(255,255,255,0.5); font-size: 11px; min-width: 36px; text-align: right; }
hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 14px 0; }
.color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.color-row label { color: rgba(255,255,255,0.6); font-size: 11px; min-width: 64px; }
.color-row input[type=color] {
  width: 36px; height: 24px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px; background: none; cursor: pointer; padding: 1px;
}
/* 그라디언트 프리뷰 */
#grad-preview {
  width: 100%; height: 18px;
  border-radius: 4px; margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  display: block;
}
/* 스톱 블록 */
.stop-block {
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 8px 8px 4px;
  margin-bottom: 8px;
}
.stop-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.stop-num { color: rgba(255,255,255,0.3); font-size: 10px; min-width: 14px; }
.stop-header input[type=color] {
  width: 28px; height: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 3px; background: none; cursor: pointer; padding: 1px;
}
.stop-label { color: rgba(255,255,255,0.4); font-size: 10px; }
.stop-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.stop-row label { color: rgba(255,255,255,0.4); font-size: 10px; min-width: 36px; }
.stop-row input[type=range] { flex: 1; accent-color: #7318D9; }
.stop-row span { color: rgba(255,255,255,0.35); font-size: 10px; min-width: 30px; text-align: right; }
</style>
</head>
<body>
<div id="main">
  <canvas id="three-canvas"></canvas>
  <canvas id="overlay"></canvas>
</div>

<div id="panel">
  <h2>Controls</h2>

  <div class="section-title">배경</div>
  <div class="color-row"><label>배경색</label><input type="color" id="bg-color" value="#000000"></div>

  <hr>

  <div class="section-title">바 그라디언트</div>
  <canvas id="grad-preview" width="238" height="18"></canvas>

  <div class="stop-block">
    <div class="stop-header"><span class="stop-num">①</span><input type="color" id="gs0-color" value="#ffffff"><span class="stop-label">컬러</span></div>
    <div class="stop-row"><label>위치</label><input type="range" id="gs0-pos" min="0" max="100" value="0" step="1"><span id="gs0-pos-val">0%</span></div>
    <div class="stop-row"><label>투명도</label><input type="range" id="gs0-alpha" min="0" max="1" value="1" step="0.01"><span id="gs0-alpha-val">1.00</span></div>
  </div>

  <div class="stop-block">
    <div class="stop-header"><span class="stop-num">②</span><input type="color" id="gs1-color" value="#09152c"><span class="stop-label">컬러</span></div>
    <div class="stop-row"><label>위치</label><input type="range" id="gs1-pos" min="0" max="100" value="28" step="1"><span id="gs1-pos-val">28%</span></div>
    <div class="stop-row"><label>투명도</label><input type="range" id="gs1-alpha" min="0" max="1" value="1" step="0.01"><span id="gs1-alpha-val">1.00</span></div>
  </div>

  <div class="stop-block">
    <div class="stop-header"><span class="stop-num">③</span><input type="color" id="gs2-color" value="#ffffff"><span class="stop-label">컬러</span></div>
    <div class="stop-row"><label>위치</label><input type="range" id="gs2-pos" min="0" max="100" value="100" step="1"><span id="gs2-pos-val">100%</span></div>
    <div class="stop-row"><label>투명도</label><input type="range" id="gs2-alpha" min="0" max="1" value="1" step="0.01"><span id="gs2-alpha-val">1.00</span></div>
  </div>

  <div class="row">
    <label>전체 불투명도</label>
    <input type="range" id="grad-alpha" min="0" max="1" value="0.30" step="0.01">
    <span id="grad-alpha-val">0.30</span>
  </div>

  <hr>

  <div class="section-title">바</div>
  <div class="row"><label>개수</label><input type="range" id="bar-count" min="1" max="40" value="28" step="1"><span id="bar-count-val">28</span></div>
  <div class="row"><label>Blur</label><input type="range" id="blur" min="0" max="120" value="90" step="1"><span id="blur-val">90</span></div>

  <hr>

  <div class="section-title">도넛 1</div>
  <div class="color-row"><label>색상 A</label><input type="color" id="d1-ca" value="#0000ff"></div>
  <div class="color-row"><label>색상 B</label><input type="color" id="d1-cb" value="#8b0030"></div>
  <div class="row"><label>크기</label><input type="range" id="d1-size" min="0.5" max="5" value="1.9" step="0.1"><span id="d1-size-val">1.90</span></div>
  <div class="row"><label>좌우</label><input type="range" id="d1-x" min="-5" max="5" value="-1.2" step="0.1"><span id="d1-x-val">-1.20</span></div>
  <div class="row"><label>상하</label><input type="range" id="d1-y" min="-5" max="5" value="0.2" step="0.1"><span id="d1-y-val">0.20</span></div>
  <div class="row"><label>X축 기울기</label><input type="range" id="d1-rx" min="-3.14" max="3.14" value="-0.47" step="0.01"><span id="d1-rx-val">-0.47</span></div>
  <div class="row"><label>Y축 기울기</label><input type="range" id="d1-ry" min="-3.14" max="3.14" value="0.61" step="0.01"><span id="d1-ry-val">0.61</span></div>
  <div class="row"><label>X축 속도</label><input type="range" id="d1-sx" min="-2" max="2" value="0.45" step="0.01"><span id="d1-sx-val">0.45</span></div>
  <div class="row"><label>Y축 속도</label><input type="range" id="d1-sy" min="-2" max="2" value="0.37" step="0.01"><span id="d1-sy-val">0.37</span></div>

  <hr>

  <div class="section-title">도넛 2</div>
  <div class="color-row"><label>색상 A</label><input type="color" id="d2-ca" value="#888800"></div>
  <div class="color-row"><label>색상 B</label><input type="color" id="d2-cb" value="#006688"></div>
  <div class="row"><label>크기</label><input type="range" id="d2-size" min="0.5" max="5" value="1.2" step="0.1"><span id="d2-size-val">1.20</span></div>
  <div class="row"><label>좌우</label><input type="range" id="d2-x" min="-5" max="5" value="1.2" step="0.1"><span id="d2-x-val">1.20</span></div>
  <div class="row"><label>상하</label><input type="range" id="d2-y" min="-5" max="5" value="-1.2" step="0.1"><span id="d2-y-val">-1.20</span></div>
  <div class="row"><label>X축 기울기</label><input type="range" id="d2-rx" min="-3.14" max="3.14" value="-0.93" step="0.01"><span id="d2-rx-val">-0.93</span></div>
  <div class="row"><label>Y축 기울기</label><input type="range" id="d2-ry" min="-3.14" max="3.14" value="0.53" step="0.01"><span id="d2-ry-val">0.53</span></div>
  <div class="row"><label>X축 속도</label><input type="range" id="d2-sx" min="-2" max="2" value="0.68" step="0.01"><span id="d2-sx-val">0.68</span></div>
  <div class="row"><label>Y축 속도</label><input type="range" id="d2-sy" min="-2" max="2" value="0.00" step="0.01"><span id="d2-sy-val">0.00</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const state = {
  blur: 90, barCount: 28, bgColor: '#000000',
  gradAlpha: 0.30,
  gradStops: [
    { color: '#ffffff', pos: 0,    alpha: 1.0 },
    { color: '#09152c', pos: 0.28, alpha: 1.0 },
    { color: '#ffffff', pos: 1.0,  alpha: 1.0 }
  ],
  d1: { x:-1.2, y:0.2,  size:1.9, rx:-0.47, ry:0.61, sx:0.45, sy:0.37, ca:'#0000ff', cb:'#8b0030' },
  d2: { x:1.2,  y:-1.2, size:1.2, rx:-0.93, ry:0.53, sx:0.68, sy:0.00, ca:'#888800', cb:'#006688' }
};

// 그라디언트 프리뷰
const gradPreview = document.getElementById('grad-preview');
const gpCtx = gradPreview.getContext('2d');

function updateGradPreview() {
  gpCtx.clearRect(0, 0, gradPreview.width, gradPreview.height);
  const grad = gpCtx.createLinearGradient(0, 0, gradPreview.width, 0);
  state.gradStops.forEach(s => {
    const hex = s.color.replace('#','');
    const r = parseInt(hex.slice(0,2),16);
    const g = parseInt(hex.slice(2,4),16);
    const b = parseInt(hex.slice(4,6),16);
    grad.addColorStop(Math.min(Math.max(s.pos,0),1), `rgba(${r},${g},${b},${s.alpha})`);
  });
  gpCtx.fillStyle = grad;
  gpCtx.fillRect(0, 0, gradPreview.width, gradPreview.height);
}

// 스톱 바인딩
[0,1,2].forEach(i => {
  const colEl   = document.getElementById(`gs${i}-color`);
  const posEl   = document.getElementById(`gs${i}-pos`);
  const posVal  = document.getElementById(`gs${i}-pos-val`);
  const alphaEl = document.getElementById(`gs${i}-alpha`);
  const alphaVal= document.getElementById(`gs${i}-alpha-val`);

  colEl.addEventListener('input', () => {
    state.gradStops[i].color = colEl.value;
    updateGradPreview();
  });
  posEl.addEventListener('input', () => {
    state.gradStops[i].pos = parseFloat(posEl.value) / 100;
    posVal.textContent = posEl.value + '%';
    updateGradPreview();
  });
  alphaEl.addEventListener('input', () => {
    state.gradStops[i].alpha = parseFloat(alphaEl.value);
    alphaVal.textContent = parseFloat(alphaEl.value).toFixed(2);
    updateGradPreview();
  });
});

document.getElementById('grad-alpha').addEventListener('input', (e) => {
  state.gradAlpha = parseFloat(e.target.value);
  document.getElementById('grad-alpha-val').textContent = state.gradAlpha.toFixed(2);
});

function bind(id, key, path) {
  const el = document.getElementById(id);
  const val = document.getElementById(id + '-val');
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    if (path) state[path][key] = v;
    else state[key] = v;
    if (val) val.textContent = Number.isInteger(v) ? v : v.toFixed(2);
    if (path === 'd1' && key === 'rx') torus1.rotation.x = v;
    if (path === 'd1' && key === 'ry') torus1.rotation.y = v;
    if (path === 'd2' && key === 'rx') torus2.rotation.x = v;
    if (path === 'd2' && key === 'ry') torus2.rotation.y = v;
    if (path && (key === 'x' || key === 'y' || key === 'size'))
      updateMeshPos(path === 'd1' ? torus1 : torus2, state[path]);
  });
}

function bindColor(id, key, path) {
  document.getElementById(id).addEventListener('input', (e) => {
    if (path) state[path][key] = e.target.value;
    else state[key] = e.target.value;
    if (key === 'bgColor') {
      renderer.setClearColor(new THREE.Color(e.target.value), 1);
      document.body.style.background = e.target.value;
    } else {
      rebuildMesh(path);
    }
  });
}

bind('blur','blur',null); bind('bar-count','barCount',null);
bind('d1-size','size','d1'); bind('d1-x','x','d1'); bind('d1-y','y','d1');
bind('d1-rx','rx','d1'); bind('d1-ry','ry','d1'); bind('d1-sx','sx','d1'); bind('d1-sy','sy','d1');
bind('d2-size','size','d2'); bind('d2-x','x','d2'); bind('d2-y','y','d2');
bind('d2-rx','rx','d2'); bind('d2-ry','ry','d2'); bind('d2-sx','sx','d2'); bind('d2-sy','sy','d2');
bindColor('bg-color','bgColor',null);
bindColor('d1-ca','ca','d1'); bindColor('d1-cb','cb','d1');
bindColor('d2-ca','ca','d2'); bindColor('d2-cb','cb','d2');

const threeCanvas = document.getElementById('three-canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: true });
renderer.setSize(W(), H());
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 100);
camera.position.z = 8;

function makeTorusMesh(outerR, tube, colorA, colorB) {
  const geo = new THREE.TorusGeometry(outerR, tube, 64, 128);
  const colors = [];
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i);
    const angle = Math.atan2(y, x);
    const t = (angle / (Math.PI * 2) + 0.5);
    const t2 = t < 0.5 ? t * 2 : (1 - t) * 2;
    const c = new THREE.Color(colorA).lerp(new THREE.Color(colorB), t2);
    colors.push(c.r, c.g, c.b);
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true }));
}

function updateMeshPos(mesh, d) {
  mesh.position.set(d.x, d.y, 0);
  mesh.scale.setScalar(d.size);
}

let torus1 = makeTorusMesh(1.0, 0.44, state.d1.ca, state.d1.cb);
let torus2 = makeTorusMesh(1.0, 0.42, state.d2.ca, state.d2.cb);
updateMeshPos(torus1, state.d1); torus1.rotation.x = state.d1.rx; torus1.rotation.y = state.d1.ry;
updateMeshPos(torus2, state.d2); torus2.rotation.x = state.d2.rx; torus2.rotation.y = state.d2.ry;
scene.add(torus1); scene.add(torus2);

function rebuildMesh(path) {
  const d = state[path], isD1 = path === 'd1';
  scene.remove(isD1 ? torus1 : torus2);
  const mesh = makeTorusMesh(1.0, isD1 ? 0.44 : 0.42, d.ca, d.cb);
  updateMeshPos(mesh, d);
  mesh.rotation.x = d.rx; mesh.rotation.y = d.ry;
  if (isD1) torus1 = mesh; else torus2 = mesh;
  scene.add(mesh);
}

const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');

function resizeAll() {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  overlay.width = W(); overlay.height = H();
}
resizeAll();
window.addEventListener('resize', resizeAll);
updateGradPreview();

let last = null;
function loop(ts) {
  if (!last) last = ts;
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  if (state.d1.sx !== 0) torus1.rotation.x += state.d1.sx * dt;
  if (state.d1.sy !== 0) torus1.rotation.y += state.d1.sy * dt;
  if (state.d2.sx !== 0) torus2.rotation.x += state.d2.sx * dt;
  if (state.d2.sy !== 0) torus2.rotation.y += state.d2.sy * dt;

  renderer.render(scene, camera);

  const ow = overlay.width, oh = overlay.height;
  ctx.clearRect(0, 0, ow, oh);

  const barW = ow / state.barCount;
  const pad = state.blur * 2;

  for (let i = 0; i < state.barCount; i++) {
    const x = i * barW;
    ctx.save();
    ctx.beginPath(); ctx.rect(x, 0, barW, oh); ctx.clip();
    ctx.filter = `blur(${state.blur}px)`;
    ctx.drawImage(threeCanvas, -pad, -pad, ow + pad*2, oh + pad*2);
    ctx.filter = 'none';

    const grad = ctx.createLinearGradient(x, 0, x + barW, 0);
    state.gradStops.forEach(s => {
      const hex = s.color.replace('#','');
      const r = parseInt(hex.slice(0,2),16);
      const g = parseInt(hex.slice(2,4),16);
      const b = parseInt(hex.slice(4,6),16);
      grad.addColorStop(Math.min(Math.max(s.pos,0),1), `rgba(${r},${g},${b},${s.alpha})`);
    });
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = state.gradAlpha;
    ctx.fillStyle = grad;
    ctx.fillRect(x, 0, barW, oh);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1.0;
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
