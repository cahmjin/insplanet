<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insplanet</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fff}
/* responsive stage: fills the viewport */
#stage{
  position:relative;
  width:100vw;height:100vh;
  background:#fff;overflow:hidden;
}

/* layer 1: background line shape (behind blob) = two circles, each parallax-moved by mouse.
   geometry derived from Figma (frame coords) scaled px->vw by 100/1920=0.0520833 */
#bgLine{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
#bgLine .circ{position:absolute;border-radius:50%;
  border:1px solid #000;opacity:.06;will-change:transform;
  transition:transform .6s cubic-bezier(.2,.8,.2,1)}
/* size & position are set in JS so they scale with the same factor as the blob */

/* layer 2: blob canvas fills the stage */
#blob{position:absolute;left:0;top:0;width:100%;height:100%;z-index:2;pointer-events:none}

/* layer 3: content */
.content{position:absolute;inset:0;z-index:3;
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;color:#3E3F44}

#ciLogo{position:absolute;left:64px;top:48px;width:140.12px;height:24.04px}

#fullMenu{position:absolute;right:48px;top:32px;width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;border-radius:999px;cursor:pointer}
#fullMenu img{width:24px;height:14px}

#letsTalk{position:absolute;right:134px;top:45px;
  display:flex;align-items:center;gap:10px;padding:4px 0;
  border-bottom:1px solid #3E3F44;cursor:pointer}
#letsTalk span{font-size:14px;font-weight:700;line-height:150%}

/* left content block: symbol + headline + subtitle, anchored bottom-left as a group */
#leftBlock{position:absolute;left:216px;bottom:120px;
  display:flex;flex-direction:column;align-items:flex-start}

#symbol{width:156px;height:8px}

#headTitle{width:734px;margin-top:20px;
  display:flex;flex-direction:column;
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:200px;line-height:1.211;color:#3E3F44}
#headTitle .ln2{margin-top:-102px}

#subTitle{width:661px;margin-top:40px;
  display:flex;flex-direction:column;gap:12px;color:#3E3F44}
#subTitle .st-head{font-size:24px;font-weight:600;line-height:150%}
#subTitle .st-body{font-size:20px;font-weight:400;line-height:150%}

#scrollHint{position:absolute;right:64px;bottom:64px;width:21px;
  display:flex;flex-direction:column;align-items:center;gap:16px}
/* faint track + dark line that draws top->bottom then exits downward, looping */
#scrollHint .bar{position:relative;width:1px;height:64px;background:rgba(26,26,26,.15);overflow:hidden}
#scrollHint .bar::after{content:'';position:absolute;left:0;top:0;width:100%;height:100%;
  background:#1A1A1A;transform-origin:top;transform:scaleY(0);
  animation:scrollDraw 2.2s cubic-bezier(.65,0,.35,1) infinite}
@keyframes scrollDraw{
  0%   {transform:scaleY(0);transform-origin:top}
  45%  {transform:scaleY(1);transform-origin:top}
  55%  {transform:scaleY(1);transform-origin:bottom}
  100% {transform:scaleY(0);transform-origin:bottom}
}
@media (prefers-reduced-motion:reduce){
  #scrollHint .bar{background:#1A1A1A}
  #scrollHint .bar::after{display:none}
}

/* custom cursor: inverting (difference) circle. desktop/fine-pointer only */
#cursor{display:none}
@media (hover:hover) and (pointer:fine){
  html,body,a,#letsTalk,#fullMenu{cursor:none}
  #cursor{display:block;position:fixed;top:0;left:0;width:32px;height:32px;border-radius:50%;
    background:transparent;pointer-events:none;z-index:9999;
    -webkit-backdrop-filter:invert(1) saturate(2.2) contrast(1.5);
    backdrop-filter:invert(1) saturate(2.2) contrast(1.5);
    will-change:transform;transition:width .25s ease,height .25s ease}
}
#scrollHint .label{font-size:14px;font-weight:700;line-height:150%;color:#000;
  writing-mode:vertical-rl;letter-spacing:1px}
</style>
</head>
<body>
<div id="stage">
  <div id="bgLine">
    <span class="circ c1"></span>
    <span class="circ c2"></span>
  </div>
  <canvas id="blob" width="1920" height="1080"></canvas>

  <div class="content">
    <img id="ciLogo" src="assets/ci_logo.svg" alt="Insplanet">

    <div id="letsTalk"><span>Let&rsquo;s Talk</span></div>
    <div id="fullMenu"><img src="assets/menu_icon.svg" alt="menu"></div>

    <div id="leftBlock">
      <img id="symbol" src="assets/symbol.svg" alt="">

      <div id="headTitle">
        <span class="ln1">We Are</span>
        <span class="ln2">Insplanet</span>
      </div>

      <div id="subTitle">
        <span class="st-head">호기심이 가득한 오늘, 무한한 가능성의 내일.</span>
        <span class="st-body">인스플래닛은 조금 더 즐겁고 진화된 디지털 경험을 만들기 위해 새로움을 고민합니다.<br>본질에 대한 이해와 넓은 시야로 누구나 공감할 수 있는 가치를 만듭니다.</span>
      </div>
    </div>

    <div id="scrollHint">
      <span class="bar"></span>
      <span class="label">SCROLL</span>
    </div>
  </div>
</div>

<div id="cursor" aria-hidden="true"></div>

<script>
/* ===== custom inverting (difference) cursor, smooth follow ===== */
(function(){
  const cur=document.getElementById('cursor');
  if(!cur||!matchMedia('(hover:hover) and (pointer:fine)').matches)return;
  let mx=innerWidth/2,my=innerHeight/2,cx=mx,cy=my;
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  // grow over interactive elements
  document.querySelectorAll('#letsTalk,#fullMenu').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cur.style.width='80px';cur.style.height='80px';});
    el.addEventListener('mouseleave',()=>{cur.style.width='32px';cur.style.height='32px';});
  });
  (function loop(){
    cx+=(mx-cx)*0.32;cy+=(my-cy)*0.32;
    const r=cur.offsetWidth/2;
    cur.style.transform='translate3d('+(cx-r)+'px,'+(cy-r)+'px,0)';
    requestAnimationFrame(loop);
  })();
})();

/* ===== magnetic + spring hover on interactive elements =====
   pulls the element toward the cursor while hovering, then springs back
   (slight overshoot) on leave. subtle. desktop/fine-pointer only. */
(function(){
  if(!matchMedia('(hover:hover) and (pointer:fine)').matches)return;
  if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  const STRENGTH=0.3, STIFF=0.12, DAMP=0.78; // spring: mild elastic overshoot
  function magnetic(el){
    let tx=0,ty=0,x=0,y=0,vx=0,vy=0;
    el.addEventListener('mousemove',e=>{
      const r=el.getBoundingClientRect();
      // subtract current translate (x,y) to get the untransformed center -> no feedback drift
      tx=(e.clientX-(r.left+r.width/2-x))*STRENGTH;
      ty=(e.clientY-(r.top+r.height/2-y))*STRENGTH;
    });
    el.addEventListener('mouseleave',()=>{tx=0;ty=0;});
    // persistent spring loop (cheap; always converges to tx/ty, springs back on leave)
    (function frame(){
      vx=(vx+(tx-x)*STIFF)*DAMP; vy=(vy+(ty-y)*STIFF)*DAMP;
      x+=vx; y+=vy;
      el.style.transform='translate('+x.toFixed(2)+'px,'+y.toFixed(2)+'px)';
      requestAnimationFrame(frame);
    })();
  }
  ['#ciLogo','#letsTalk','#fullMenu'].forEach(sel=>{
    const el=document.querySelector(sel); if(el)magnetic(el);
  });
})();

/* ===== background circles =====
   scale with the SAME factor as the blob: k = clamp(min(W,H),864,1296)/1080,
   positioned around the viewport center (like the blob), + subtle mouse parallax. */
(function(){
  const c1=document.querySelector('#bgLine .c1');
  const c2=document.querySelector('#bgLine .c2');
  if(!c1||!c2)return;
  const R=718; // design circle radius (px @ 1080 baseline)
  // design circle centers as offset from the 1920x1080 frame center (960,540)
  const C=[{el:c1,ox:520.5,oy:-340.5},{el:c2,ox:210.5,oy:-210.5}];
  function k(){return Math.max(0.8,Math.min(Math.min(innerWidth,innerHeight)/1080,1.2));} // == blob factor
  function layout(){
    const f=k(),r=R*f,d=r*2,cx=innerWidth/2,cy=innerHeight/2;
    C.forEach(o=>{
      o.el.style.width=d+'px';o.el.style.height=d+'px';
      o.el.style.left=(cx+o.ox*f-r)+'px';
      o.el.style.top =(cy+o.oy*f-r)+'px';
    });
  }
  layout();
  window.addEventListener('resize',layout);
  window.addEventListener('mousemove',e=>{
    const mx=(e.clientX/innerWidth-0.5)*2;   // -1..1
    const my=(e.clientY/innerHeight-0.5)*2;  // -1..1
    c1.style.transform='translate('+(mx*14)+'px,'+(my*14)+'px)';
    c2.style.transform='translate('+(mx*-22)+'px,'+(my*20)+'px)';
  });
})();

/* ===== WebGL blob sphere (from blob_sphere.html, UI removed, params fixed,
        outside-of-sphere made transparent so background line shows through) ===== */
const canvas=document.getElementById('blob');
const gl=canvas.getContext('webgl',{antialias:false,premultipliedAlpha:true,alpha:true,powerPreference:'high-performance'});

/* fixed params (source default values) */
const P={
  sSize:1600, sSpeed:48, sBlur:24, sWarp:20,
  lSize:13, lWarp:2.1, lSpeed:64, lPoints:8, lBlur:4
};

/* size the drawing buffer to the canvas' actual (responsive) pixel size */
function setSize(){
  canvas.width=Math.max(1,canvas.clientWidth);
  canvas.height=Math.max(1,canvas.clientHeight);
}
setSize();

let fboTex,fbo;
function initFBO(){
  if(fboTex)gl.deleteTexture(fboTex);
  if(fbo)gl.deleteFramebuffer(fbo);
  fboTex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,fboTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,canvas.width,canvas.height,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  fbo=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,fboTex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
}
initFBO();

/* on resize: re-size buffer + rebuild FBO (debounced) */
let rt;
window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{setSize();initFBO();},150);});

const V=`attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}`;

const F1=`precision mediump float;
uniform vec2 u_res;
uniform float u_st,u_ss,u_sb,u_sw,u_s;
void main(){
  vec2 px=vec2(gl_FragCoord.x,u_res.y-gl_FragCoord.y);
  vec2 C=u_res*0.5;
  float S=u_s;
  float MR=S*u_ss;
  float t=u_st;
  vec2 bp[6];
  bp[0]=C+vec2(sin(t*.41)*.30+cos(t*.27)*.15,cos(t*.38)*.28+sin(t*.19)*.12)*MR;
  bp[1]=C+vec2(sin(t*.33+1.2)*.32+cos(t*.61)*.14,cos(t*.29+.5)*.28+sin(t*.44)*.12)*MR;
  bp[2]=C+vec2(sin(t*.37+2.5)*.34+cos(t*.53)*.16,cos(t*.43+1.1)*.30+sin(t*.28)*.14)*MR;
  bp[3]=C+vec2(sin(t*.29+4.)*.30+cos(t*.61)*.13,cos(t*.35+2.3)*.26+sin(t*.47)*.12)*MR;
  bp[4]=C+vec2(sin(t*.51+3.1)*.28+cos(t*.38)*.14,cos(t*.44+1.7)*.24+sin(t*.33)*.12)*MR;
  bp[5]=C+vec2(sin(t*.45+5.2)*.26+cos(t*.72)*.12,cos(t*.39+3.8)*.22+sin(t*.56)*.10)*MR;
  float br[6];
  br[0]=MR*(.55+sin(t*.5)*.05);br[1]=MR*(.48+sin(t*.6+1.)*.04);
  br[2]=MR*(.44+sin(t*.7+2.)*.04);br[3]=MR*(.44+sin(t*.8+3.)*.04);
  br[4]=MR*(.38+sin(t*.9+4.)*.03);br[5]=MR*(.34+sin(t*1.+5.)*.03);
  float sph[6];sph[0]=0.;sph[1]=1.05;sph[2]=2.1;sph[3]=3.15;sph[4]=4.2;sph[5]=5.25;
  float sfr[6];sfr[0]=.73;sfr[1]=.61;sfr[2]=.89;sfr[3]=.67;sfr[4]=.95;sfr[5]=.79;
  vec3 cl[6];
  cl[0]=vec3(1.,1.,1.);cl[1]=vec3(.72,.60,1.);cl[2]=vec3(1.,.10,.82);
  cl[3]=vec3(.05,.82,1.);cl[4]=vec3(.38,.78,1.);cl[5]=vec3(1.,.42,.95);
  float tw=0.;vec3 tc=vec3(0.);
  for(int i=0;i<6;i++){
    vec2 dv=px-bp[i];float d=length(dv);float a=atan(dv.y,dv.x);
    float r=br[i]*(1.+(sin(a*2.+t*sfr[i]*1.3+sph[i])*.18+sin(a*3.-t*sfr[i]*.9+sph[i]*1.3)*.12+sin(a*5.+t*sfr[i]*1.7+sph[i]*.7)*.07+cos(a*4.-t*sfr[i]*1.1+sph[i]*1.6)*.09)*u_sw);
    r=max(r,1.);float nd=d/r;float fs=1.-u_sb*.75;float alpha=smoothstep(1.,fs,nd);
    tw+=alpha;tc+=mix(vec3(1.),cl[i],alpha)*alpha;
  }
  vec3 col=tw>0.001?tc/tw:vec3(1.);
  gl_FragColor=vec4(col,clamp(tw,0.,1.));
}`;

/* F2: identical math, but final alpha = sphere mask (bigA) instead of 1.0
   so the area outside the sphere is transparent and the bg line shows through */
const F2=`precision mediump float;
uniform vec2 u_res;
uniform sampler2D u_tex;
uniform float u_ph,u_ls,u_lb,u_lw,u_lp,u_s;
void main(){
  vec2 px=vec2(gl_FragCoord.x,u_res.y-gl_FragCoord.y);
  vec2 uv=gl_FragCoord.xy/u_res;
  vec2 C=u_res*0.5;
  float S=u_s;
  float R=S*u_ls;
  vec2 dv=px-C;float d=length(dv);float ang=atan(dv.y,dv.x);
  float w=u_lw;float p=u_lp;float ph=u_ph;
  float deform=
    sin(ang*2.+ph      )*.18
   +sin(ang*3.-ph*1.13 )*.12
   +sin(ang*5.+ph*.87  )*.07
   +cos(ang*4.-ph*1.6  )*.09;
  float bigR=max(R,1.);
  float nd=d/(bigR*(1.+deform*w*.06));
  float blurWave=sin(ang*2.+ph*0.7)*.4+sin(ang*3.-ph*0.5)*.3+cos(ang*5.+ph*0.9)*.2;
  float blurAmount=max(u_lb*(1.0+blurWave),0.0);
  float fs=1.-blurAmount*.65;
  float bigA=smoothstep(1.,fs,nd);
  vec4 s=texture2D(u_tex,uv);
  // 작은 구체(메타볼)의 알파를 그대로 살려서 큰 구체 마스크와 곱함 → 최종 알파
  float a=s.a*bigA;
  // 색은 흰색을 섞지 않은 순수 블롭색. 프리멀티플라이드(색*알파)로 출력
  gl_FragColor=vec4(s.rgb*a,a);
}`;

function compile(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
function mkprog(fs){const p=gl.createProgram();gl.attachShader(p,compile(gl.VERTEX_SHADER,V));gl.attachShader(p,compile(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
const p1=mkprog(F1),p2=mkprog(F2);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
function bq(p){const l=gl.getAttribLocation(p,'a');gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);}

const u1={res:gl.getUniformLocation(p1,'u_res'),st:gl.getUniformLocation(p1,'u_st'),ss:gl.getUniformLocation(p1,'u_ss'),sb:gl.getUniformLocation(p1,'u_sb'),sw:gl.getUniformLocation(p1,'u_sw'),s:gl.getUniformLocation(p1,'u_s')};
const u2={res:gl.getUniformLocation(p2,'u_res'),tex:gl.getUniformLocation(p2,'u_tex'),ph:gl.getUniformLocation(p2,'u_ph'),ls:gl.getUniformLocation(p2,'u_ls'),lb:gl.getUniformLocation(p2,'u_lb'),lw:gl.getUniformLocation(p2,'u_lw'),lp:gl.getUniformLocation(p2,'u_lp'),s:gl.getUniformLocation(p2,'u_s')};

/* blob size basis: design baseline (min side = 1080), clamped to 80%~120%. */
const BASE=1080;
function blobS(W,H){return Math.max(BASE*0.8,Math.min(Math.min(W,H),BASE*1.2));}

/* precomputed fixed param values */
const ss=Math.max(.001,P.sSize/1000);
const sb=P.sBlur/20;
const sw=P.sWarp/20;
const ls=P.lSize/20*.5;
const lb=P.lBlur/20;
const lw=P.lWarp;
const lp=P.lPoints;
const sSpd=P.sSpeed/100;
const lSpd=P.lSpeed/100;

let st=0,phase=0,last=performance.now();
function draw(now){
  requestAnimationFrame(draw);
  const dt=Math.min((now-last)/1000,.05);last=now;
  st+=dt*(0.5+sSpd*3.0);
  phase+=dt*(lSpd*lSpd*8.0);
  const W=canvas.width,H=canvas.height;
  const S=blobS(W,H);

  // pass 1 -> FBO
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.viewport(0,0,W,H);
  gl.disable(gl.BLEND);
  gl.useProgram(p1);bq(p1);
  gl.uniform2f(u1.res,W,H);gl.uniform1f(u1.st,st);
  gl.uniform1f(u1.ss,ss);gl.uniform1f(u1.sb,sb);gl.uniform1f(u1.sw,sw);
  gl.uniform1f(u1.s,S);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // pass 2 -> screen (transparent outside sphere)
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,W,H);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
  gl.useProgram(p2);bq(p2);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fboTex);
  gl.uniform1i(u2.tex,0);gl.uniform2f(u2.res,W,H);
  gl.uniform1f(u2.ph,phase);gl.uniform1f(u2.ls,ls);
  gl.uniform1f(u2.lb,lb);gl.uniform1f(u2.lw,lw);gl.uniform1f(u2.lp,lp);
  gl.uniform1f(u2.s,S);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
