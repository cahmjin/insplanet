<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glow Lab — Say Hello horizon</title>
<style>
  :root{ color-scheme:dark; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#141414; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif; color:#fff; }
  #gl{ position:fixed; inset:0; width:100%; height:100%; display:block; }

  /* control panel */
  #panel{ position:fixed; top:16px; right:16px; width:300px; max-height:calc(100vh - 32px);
    overflow:auto; padding:16px; border-radius:14px;
    background:rgba(20,20,24,.72); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.12); font-size:12px; line-height:1.5; z-index:10; }
  #panel h1{ font-size:13px; margin:0 0 4px; font-weight:700; letter-spacing:.02em; }
  #panel p.hint{ margin:0 0 12px; opacity:.55; font-size:11px; }
  .row{ margin:0 0 11px; }
  .row label{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .row label .name{ opacity:.85; }
  .row label .val{ font-variant-numeric:tabular-nums; opacity:.95; font-weight:600; }
  input[type=range]{ width:100%; margin:0; accent-color:#9a6cff; }
  .colors{ display:flex; gap:10px; margin:2px 0 12px; }
  .colors .c{ flex:1; }
  .colors .c span{ display:block; opacity:.85; margin-bottom:4px; }
  input[type=color]{ width:100%; height:30px; padding:0; border:1px solid rgba(255,255,255,.15);
    border-radius:8px; background:none; cursor:pointer; }
  .btns{ display:flex; gap:8px; margin-top:6px; }
  .btns button{ flex:1; padding:8px 10px; border-radius:8px; cursor:pointer;
    border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.08); color:#fff; font-size:11px; }
  .btns button:hover{ background:rgba(255,255,255,.16); }
  #out{ width:100%; margin-top:10px; height:120px; resize:vertical; font-size:10.5px; line-height:1.45;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:#cfc7ff;
    background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.12); border-radius:8px; padding:8px; }
  .collapsed #body{ display:none; }
  #toggle{ position:absolute; top:14px; right:14px; cursor:pointer; opacity:.6; font-size:14px; user-select:none; }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div id="panel">
  <span id="toggle" title="패널 접기/펼치기">⌄</span>
  <h1>Glow Lab</h1>
  <p class="hint">지구 반대편에서 떠오르는 빛 — 슬라이더로 맞춘 뒤 값을 알려줘.</p>
  <div id="body">
    <!-- sliders are generated by JS -->
    <div id="sliders"></div>
    <div class="colors">
      <div class="c"><span>Bloom 1</span><input type="color" id="colA" value="#7a3dd6"></div>
      <div class="c"><span>Bloom 2</span><input type="color" id="colA2" value="#40d8e2"></div>
    </div>
    <div class="colors">
      <div class="c"><span>Bloom 3</span><input type="color" id="colA3" value="#ec32b1"></div>
      <div class="c"><span>Rim 색</span><input type="color" id="colB" value="#b397dd"></div>
    </div>
    <div class="btns">
      <button id="reset">초기값</button>
      <button id="copy">설정 복사</button>
    </div>
    <textarea id="out" readonly></textarea>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('gl');
  const gl = canvas.getContext('webgl', {alpha:false, antialias:false, premultipliedAlpha:false});
  if(!gl){ document.body.insertAdjacentHTML('beforeend','<p style="position:fixed;inset:0;display:grid;place-items:center">WebGL을 사용할 수 없어요.</p>'); return; }

  /* ---- slider definitions: key, label, min, max, step, default ---- */
  const PARAMS = [
    {k:'horizon',  label:'호 위치 (세로)',   min:0.30, max:0.95, step:0.005, def:0.30},
    {k:'curve',    label:'곡률 (반지름)',     min:1.0,  max:8.0,  step:0.1,   def:8.0},
    {k:'scale',    label:'호 크기',           min:0.4,  max:2.5,  step:0.05,  def:0.40},
    {k:'rim',      label:'림 두께',           min:0.0002, max:0.004, step:0.0001, def:0.0024},
    {k:'rimBlur',  label:'림 블러',           min:0.0,  max:1.80, step:0.05,  def:1.20},
    {k:'rimY',     label:'림 상하 (단독)',    min:-0.10, max:0.20, step:0.005, def:0.02},
    {k:'rimSize',  label:'림 좌우 크기',      min:0.40, max:2.50, step:0.01,  def:0.81},
    {k:'planetGlow', label:'행성 표면광',     min:0.0,  max:1.00, step:0.02,  def:1.00},
    {k:'planetReach',label:'행성광 범위',     min:0.01, max:0.20, step:0.005, def:0.09},
    {k:'bloom',    label:'블룸 퍼짐',         min:0.05, max:0.60, step:0.01,  def:0.36},
    {k:'sunWidth', label:'중심 집중',         min:0.05, max:1.50, step:0.05,  def:0.70},
    {k:'edge',     label:'끝 뾰족함',         min:0.0,  max:0.40, step:0.01,  def:0.32},
    {k:'shimmer',  label:'일렁임 양',         min:0.0,  max:0.06, step:0.002, def:0.00},
    {k:'speed',    label:'일렁임 속도',       min:0.0,  max:1.5,  step:0.05,  def:0.80},
    {k:'intensity',label:'밝기',             min:0.3,  max:3.0,  step:0.05,  def:0.55},
    {k:'colorMix', label:'색 섞임',           min:0.0,  max:1.0,  step:0.05,  def:0.80},
    {k:'colorFlow',label:'색 흐름 속도',       min:0.0,  max:1.5,  step:0.05,  def:1.20},
    {k:'lift',     label:'바닥 페이드',       min:0.0,  max:0.40, step:0.01,  def:0.23},
  ];
  const state = {};
  PARAMS.forEach(p=> state[p.k]=p.def);
  let colA = '#7a3dd6', colA2 = '#40d8e2', colA3 = '#ec32b1', colB = '#b397dd';

  /* ---- build the UI ---- */
  const sliders = document.getElementById('sliders');
  const valEls = {};
  PARAMS.forEach(p=>{
    const row = document.createElement('div'); row.className='row';
    row.innerHTML = `<label><span class="name">${p.label}</span><span class="val" id="v_${p.k}"></span></label>
      <input type="range" id="s_${p.k}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.def}">`;
    sliders.appendChild(row);
    const input = row.querySelector('input');
    valEls[p.k] = row.querySelector('.val');
    input.addEventListener('input', ()=>{ state[p.k]=parseFloat(input.value); refreshLabels(); writeOut(); });
  });
  const colAEl=document.getElementById('colA'), colA2El=document.getElementById('colA2'),
        colA3El=document.getElementById('colA3'), colBEl=document.getElementById('colB');
  colAEl.addEventListener('input',()=>{colA=colAEl.value; writeOut();});
  colA2El.addEventListener('input',()=>{colA2=colA2El.value; writeOut();});
  colA3El.addEventListener('input',()=>{colA3=colA3El.value; writeOut();});
  colBEl.addEventListener('input',()=>{colB=colBEl.value; writeOut();});

  function refreshLabels(){ PARAMS.forEach(p=>{ valEls[p.k].textContent = state[p.k].toFixed(p.step<0.01?4:2); }); }
  function writeOut(){
    const o = {...state, colA, colA2, colA3, colB};
    document.getElementById('out').value = JSON.stringify(o,null,0).replace(/,/g,',\n ');
  }
  document.getElementById('reset').addEventListener('click',()=>{
    PARAMS.forEach(p=>{ state[p.k]=p.def; document.getElementById('s_'+p.k).value=p.def; });
    colA='#7a3dd6'; colA2='#40d8e2'; colA3='#ec32b1'; colB='#b397dd';
    colAEl.value=colA; colA2El.value=colA2; colA3El.value=colA3; colBEl.value=colB; refreshLabels(); writeOut();
  });
  document.getElementById('copy').addEventListener('click',()=>{
    const ta=document.getElementById('out'); ta.select();
    navigator.clipboard && navigator.clipboard.writeText(ta.value);
  });
  document.getElementById('toggle').addEventListener('click',()=>{
    document.getElementById('panel').classList.toggle('collapsed');
  });
  refreshLabels(); writeOut();

  function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [((n>>16)&255)/255, ((n>>8)&255)/255, (n&255)/255]; }

  /* ---- shaders ---- */
  const VERT = `attribute vec2 a; void main(){ gl_Position=vec4(a,0.,1.); }`;
  const FRAG = `
  precision highp float;
  uniform vec2 uRes; uniform float uTime;
  uniform float uHorizon, uCurve, uScale, uRim, uRimBlur, uRimY, uRimSize, uPlanetGlow, uPlanetReach, uBloom, uSunWidth, uEdge, uShimmer, uSpeed, uIntensity, uColorMix, uColorFlow, uLift;
  uniform vec3 uColA, uColA2, uColA3, uColB;

  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){ vec2 i=floor(p),f=fract(p);
    float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
    vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
  float fbm(vec2 p){ float v=0.,a=.5; for(int i=0;i<5;i++){ v+=a*noise(p); p=p*2.0+vec2(11.3,7.1); a*=.5; } return v; }

  void main(){
    vec2 uv = gl_FragCoord.xy/uRes;
    float aspect = uRes.x/uRes.y;
    vec2 p = vec2((uv.x-0.5)*aspect, uv.y);
    // arc size: zoom the geometry around the crest (0, uHorizon) — bigger uScale = bigger arc
    p = (p - vec2(0.0, uHorizon))/uScale + vec2(0.0, uHorizon);

    float R = uCurve;
    vec2 c = vec2(0.0, uHorizon - R);
    float d = length(p-c) - R;               // signed distance to the rim

    // flowing shimmer along the arc
    float t = uTime*uSpeed;
    float flow  = fbm(vec2(p.x*2.0, t*0.6)) - 0.5;
    float flow2 = fbm(vec2(p.x*5.0 - t, t*0.9 + 5.0));
    d += flow*uShimmer;

    float above = max(d, 0.0);
    vec2 pRim   = vec2(p.x / uRimSize, p.y);                 // rim-only horizontal width (bigger = wider arc)
    float dRim  = (length(pRim - c) - R) - uRimY;            // rim distance: width-scaled + vertical shift
    float rim   = pow(exp(-dRim*dRim/uRim), 2.0 - uRimBlur); // thin bright line; uRimBlur softens it
    float bloom = exp(-above/uBloom);                        // soft glow above the rim
    float centerW = exp(-p.x*p.x/(uSunWidth*2.0));           // concentrate toward centre
    float sun   = exp(-p.x*p.x/(uSunWidth*0.5)) * exp(-above/(uBloom*0.35));
    float flick = 0.7 + 0.6*flow2;                           // brightness undulation

    // flowing multi-colour palette — bloom hue drifts purple<->pink<->blue along the arc + time
    float cf = uTime*uColorFlow;
    float m1 = fbm(vec2(p.x*1.3 + cf*0.40, cf*0.25 + 9.0));
    float m2 = fbm(vec2(p.x*0.8 - cf*0.30, cf*0.18 + 21.0));
    vec3 palette = uColA;
    palette = mix(palette, uColA2, clamp((m1-0.25)*2.0, 0.0, 1.0)*uColorMix);
    palette = mix(palette, uColA3, clamp((m2-0.40)*2.0, 0.0, 1.0)*uColorMix);

    // edge taper: high-power horizontal falloff so the rim/bloom fade to sharp points at the L/R
    float taper = exp(-pow(abs(p.x), 4.0) * uEdge);

    // ---- SKY: atmosphere glow + bright rim (drawn first, full; planet will cover it) ----
    vec3 sky = vec3(0.0);
    sky += palette * bloom * centerW * 1.2 * flick * taper;
    sky += palette * sun   * 1.3 * flick;
    sky += uColB   * rim   * (0.7 + 0.6*centerW);
    sky += uColB   * sun   * 0.6;

    // ---- PLANET body: dark sphere whose limb catches a little light ----
    float surf = exp(min(d, 0.0) / max(uPlanetReach, 0.001));   // 1 at limb, fades inward
    vec3 planet = palette * surf * uPlanetGlow * centerW * flick;

    // ---- composite: the planet disc sits IN FRONT, occluding everything below its limb (d<0) ----
    float planetCover = smoothstep(0.006, -0.006, d);           // 1 inside planet, 0 in sky (crisp limb)
    vec3 col = mix(sky, planet, planetCover);
    col *= uIntensity;
    col *= smoothstep(0.0, max(uLift,0.001), uv.y);          // fade toward the very bottom
    gl_FragColor = vec4(vec3(0.0784) + col, 1.0);            // #141414 base + additive glow (matches site)
  }`;

  function compile(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog); gl.useProgram(prog);

  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const aLoc = gl.getAttribLocation(prog,'a'); gl.enableVertexAttribArray(aLoc);
  gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

  const U = {};
  ['uRes','uTime','uHorizon','uCurve','uScale','uRim','uRimBlur','uRimY','uRimSize','uPlanetGlow','uPlanetReach','uBloom','uSunWidth','uEdge','uShimmer','uSpeed','uIntensity','uColorMix','uColorFlow','uLift','uColA','uColA2','uColA3','uColB']
    .forEach(n=> U[n]=gl.getUniformLocation(prog,n));

  function resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    const w = Math.round(canvas.clientWidth*dpr), h = Math.round(canvas.clientHeight*dpr);
    if(canvas.width!==w||canvas.height!==h){ canvas.width=w; canvas.height=h; gl.viewport(0,0,w,h); }
  }
  window.addEventListener('resize', resize);

  const t0 = performance.now();
  (function frame(){
    resize();
    gl.uniform2f(U.uRes, canvas.width, canvas.height);
    gl.uniform1f(U.uTime, (performance.now()-t0)/1000);
    gl.uniform1f(U.uHorizon, state.horizon);
    gl.uniform1f(U.uCurve, state.curve);
    gl.uniform1f(U.uScale, state.scale);
    gl.uniform1f(U.uRim, state.rim);
    gl.uniform1f(U.uRimBlur, state.rimBlur);
    gl.uniform1f(U.uRimY, state.rimY);
    gl.uniform1f(U.uRimSize, state.rimSize);
    gl.uniform1f(U.uPlanetGlow, state.planetGlow);
    gl.uniform1f(U.uPlanetReach, state.planetReach);
    gl.uniform1f(U.uBloom, state.bloom);
    gl.uniform1f(U.uSunWidth, state.sunWidth);
    gl.uniform1f(U.uEdge, state.edge);
    gl.uniform1f(U.uShimmer, state.shimmer);
    gl.uniform1f(U.uSpeed, state.speed);
    gl.uniform1f(U.uIntensity, state.intensity);
    gl.uniform1f(U.uColorMix, state.colorMix);
    gl.uniform1f(U.uColorFlow, state.colorFlow);
    gl.uniform1f(U.uLift, state.lift);
    gl.uniform3fv(U.uColA, hexToRgb(colA));
    gl.uniform3fv(U.uColA2, hexToRgb(colA2));
    gl.uniform3fv(U.uColA3, hexToRgb(colA3));
    gl.uniform3fv(U.uColB, hexToRgb(colB));
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(frame);
  })();
})();
</script>
</body>
</html>
